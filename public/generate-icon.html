    function generate(size) {
      const canvas = document.getElementById('c');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const pad = size * 0.08;
      const svgSize = size - pad * 2;

      const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
        <rect width="${size}" height="${size}" rx="${size*0.22}" fill="#0D1117"/>
        <g transform="translate(${pad}, ${pad}) scale(${svgSize / 720})">
          <g transform="translate(-180, -160)">${SVG_PATH}</g>
        </g>
      </svg>`;

      const img = new Image();
      const blob = new Blob([svgStr], {type:'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        const a = document.createElement('a');
        a.download = `pwa-${size}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      };
      img.src = url;
    }

    // Preview
    generate(192);
